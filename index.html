<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agente Terrenos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
    header { background: white; padding: 16px 20px; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; gap: 12px; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; background: #e8f0fe; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .header-text h1 { font-size: 16px; font-weight: 600; color: #1a1a1a; }
    .header-text p { font-size: 12px; color: #4caf50; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .msg.bot { align-self: flex-start; background: white; border: 1px solid #e5e5e5; border-radius: 0 12px 12px 12px; color: #1a1a1a; }
    .msg.user { align-self: flex-end; background: #1a73e8; color: white; border-radius: 12px 0 12px 12px; }
    .msg.error { background: #fdecea; border: 1px solid #f5c6cb; color: #c0392b; align-self: flex-start; }
    .msg img { max-width: 200px; border-radius: 8px; display: block; margin-bottom: 6px; }
    .table-result { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
    .table-result td { padding: 5px 8px; border-bottom: 1px solid #f0f0f0; }
    .table-result td:first-child { color: #666; white-space: nowrap; }
    .table-result td:last-child { font-weight: 500; }
    .success-badge { display: inline-block; background: #e8f5e9; color: #2e7d32; font-size: 12px; padding: 3px 8px; border-radius: 10px; margin-bottom: 8px; }
    footer { background: white; padding: 12px 16px; border-top: 1px solid #e5e5e5; display: flex; flex-direction: column; gap: 8px; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    textarea { flex: 1; padding: 10px 14px; border: 1px solid #e5e5e5; border-radius: 20px; font-size: 14px; font-family: inherit; resize: none; outline: none; line-height: 1.4; }
    textarea:focus { border-color: #1a73e8; }
    .btn-send { width: 40px; height: 40px; border-radius: 50%; background: #1a73e8; color: white; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-send:disabled { background: #ccc; cursor: not-allowed; }
    .btn-img { width: 40px; height: 40px; border-radius: 50%; background: #f1f3f4; color: #666; border: 1px solid #e5e5e5; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-img:hover { background: #e8f0fe; color: #1a73e8; }
    #preview-bar { display: none; align-items: center; gap: 8px; padding: 6px 8px; background: #f8f9fa; border-radius: 8px; border: 1px solid #e5e5e5; }
    #preview-bar img { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; }
    #preview-bar span { font-size: 12px; color: #666; flex: 1; }
    #preview-bar button { background: none; border: none; color: #999; cursor: pointer; font-size: 16px; }
    .typing { display: flex; gap: 4px; padding: 12px 14px; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: #ccc; animation: bounce 1s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  </style>
</head>
<body>
  <header>
    <div class="avatar">🏡</div>
    <div class="header-text">
      <h1>Agente Terrenos CABA</h1>
      <p>● Conectado a Google Sheets</p>
    </div>
  </header>

  <div id="messages">
    <div class="msg bot">¡Hola! Mandame texto o una foto del terreno y lo cargo en el Sheet automáticamente.</div>
  </div>

  <footer>
    <div id="preview-bar">
      <img id="preview-img" src="" alt="preview"/>
      <span id="preview-name">imagen.jpg</span>
      <button onclick="clearImage()">✕</button>
    </div>
    <div class="input-row">
      <button class="btn-img" onclick="document.getElementById('file-input').click()" title="Subir imagen">📎</button>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(this)">
      <textarea id="input" placeholder="Pegá texto o subí una foto del terreno..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button class="btn-send" id="btn" onclick="send()">↑</button>
    </div>
  </footer>

  <script>
    let pendingImage = null;
    let pendingImageType = null;

    function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  console.log('file selected:', file.name, file.size, file.type);
  const reader = new FileReader();
  reader.onload = (e) => {
    pendingImage = e.target.result.split(',')[1];
    pendingImageType = file.type;
    document.getElementById('preview-img').src = e.target.result;
    document.getElementById('preview-name').textContent = file.name;
    document.getElementById('preview-bar').style.display = 'flex';
    console.log('imagen cargada OK, tamaño base64:', pendingImage.length);
  };
  reader.readAsDataURL(file);
  input.value = '';
}
    }

    function clearImage() {
      pendingImage = null;
      pendingImageType = null;
      document.getElementById('preview-bar').style.display = 'none';
      document.getElementById('preview-img').src = '';
    }

    function addMsg(text, type, isHTML) {
      const el = document.createElement('div');
      el.className = 'msg ' + type;
      if (isHTML) el.innerHTML = text;
      else el.textContent = text;
      document.getElementById('messages').appendChild(el);
      el.scrollIntoView({ behavior: 'smooth' });
      return el;
    }

    function renderTable(data) {
      const fields = [
        ['Fecha', data.fecha],
        ['Dirección', data.direccion],
        ['Barrio', data.barrio],
        ['Frente', data.frente ? data.frente + ' m' : ''],
        ['Fondo', data.fondo ? data.fondo + ' m' : ''],
        ['Precio', data.precio ? 'USD ' + Number(data.precio).toLocaleString('es-AR') : ''],
        ['M2 vendibles', data.m2_vendibles ? data.m2_vendibles + ' m²' : ''],
        ['Incidencia', data.incidencia ? 'USD ' + Number(data.incidencia).toLocaleString('es-AR') + '/m²' : ''],
      ];
      let html = '<span class="success-badge">✅ Cargado en Google Sheets</span>';
      html += '<table class="table-result">';
      fields.forEach(([label, val]) => {
        html += `<tr><td>${label}</td><td>${val || '<span style="color:#ccc">—</span>'}</td></tr>`;
      });
      html += '</table>';
      return html;
    }
