<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agente Terrenos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
    header { background: white; padding: 16px 20px; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; gap: 12px; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; background: #e8f0fe; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .header-text h1 { font-size: 16px; font-weight: 600; color: #1a1a1a; }
    .header-text p { font-size: 12px; color: #4caf50; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .msg.bot { align-self: flex-start; background: white; border: 1px solid #e5e5e5; border-radius: 0 12px 12px 12px; color: #1a1a1a; }
    .msg.user { align-self: flex-end; background: #1a73e8; color: white; border-radius: 12px 0 12px 12px; }
    .msg.error { background: #fdecea; border: 1px solid #f5c6cb; color: #c0392b; align-self: flex-start; }
    .msg img.preview { max-width: 200px; border-radius: 8px; display: block; margin-bottom: 6px; }
    .table-result { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
    .table-result td { padding: 5px 8px; border-bottom: 1px solid #f0f0f0; }
    .table-result td:first-child { color: #666; white-space: nowrap; }
    .table-result td:last-child { font-weight: 500; }
    .success-badge { display: inline-block; background: #e8f5e9; color: #2e7d32; font-size: 12px; padding: 3px 8px; border-radius: 10px; margin-bottom: 8px; }
    footer { background: white; padding: 12px 16px; border-top: 1px solid #e5e5e5; display: flex; flex-direction: column; gap: 8px; }
    #preview-bar { display: none; align-items: center; gap: 8px; padding: 6px 8px; background: #f8f9fa; border-radius: 8px; border: 1px solid #e5e5e5; }
    #preview-bar img { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; }
    #preview-bar span { font-size: 12px; color: #666; flex: 1; }
    #preview-bar button { background: none; border: none; color: #999; cursor: pointer; font-size: 16px; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    #input { flex: 1; padding: 10px 14px; border: 1px solid #e5e5e5; border-radius: 20px; font-size: 14px; font-family: inherit; resize: none; outline: none; line-height: 1.4; }
    #input:focus { border-color: #1a73e8; }
    .btn-send { width: 40px; height: 40px; border-radius: 50%; background: #1a73e8; color: white; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-send:disabled { background: #ccc; cursor: not-allowed; }
    .btn-img { width: 40px; height: 40px; border-radius: 50%; background: #f1f3f4; color: #666; border: 1px solid #e5e5e5; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .typing { display: flex; gap: 4px; padding: 12px 14px; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: #ccc; animation: bounce 1s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  </style>
</head>
<body>
  <header>
    <div class="avatar">🏡</div>
    <div class="header-text">
      <h1>Agente Terrenos CABA</h1>
      <p>● Conectado a Google Sheets</p>
    </div>
  </header>

  <div id="messages">
    <div class="msg bot">¡Hola! Mandame texto o una foto (📎 o Ctrl+V) y lo cargo en el Sheet.</div>
  </div>

  <footer>
    <div id="preview-bar">
      <img id="preview-img" src="" alt="preview"/>
      <span id="preview-name">imagen</span>
      <button onclick="clearImage()">✕</button>
    </div>
    <div class="input-row">
      <button class="btn-img" onclick="document.getElementById('file-input').click()">📎</button>
      <input type="file" id="file-input" accept="image/*" style="display:none">
      <textarea id="input" rows="1" placeholder="Pegá texto o imagen (Ctrl+V)..."></textarea>
      <button class="btn-send" id="btn-send">↑</button>
    </div>
  </footer>

  <script>
    var pendingImage = null;
    var pendingImageType = null;

    document.getElementById('file-input').addEventListener('change', function() {
      var file = this.files[0];
      if (!file) return;
      loadImage(file, file.name);
      this.value = '';
    });

    document.getElementById('input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    document.getElementById('input').addEventListener('paste', function(e) {
      var items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (var i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') !== -1) {
          e.preventDefault();
          loadImage(items[i].getAsFile(), 'imagen pegada');
          break;
        }
      }
    });

    document.getElementById('btn-send').addEventListener('click', send);

    function loadImage(file, name) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var src = e.target.result;
        pendingImage = src.split(',')[1];
        pendingImageType = file.type || 'image/jpeg';
        document.getElementById('preview-img').src = src;
        document.getElementById('preview-name').textContent = name;
        document.getElementById('preview-bar').style.display = 'flex';
      };
      reader.readAsDataURL(file);
    }

    function clearImage() {
      pendingImage = null;
      pendingImageType = null;
      document.getElementById('preview-bar').style.display = 'none';
      document.getElementById('preview-img').src = '';
    }

    function addMsg(content, type, isHTML) {
      var el = document.createElement('div');
      el.className = 'msg ' + type;
      if (isHTML) el.innerHTML = content;
      else el.textContent = content;
      document.getElementById('messages').appendChild(el);
      el.scrollIntoView({ behavior: 'smooth' });
      return el;
    }

    function renderTable(data) {
      var fields = [
        ['Fecha', data.fecha],
        ['Dirección', data.direccion],
        ['Barrio', data.barrio],
        ['Frente', data.frente ? data.frente + ' m' : ''],
        ['Fondo', data.fondo ? data.fondo + ' m' : ''],
        ['Precio', data.precio ? 'USD ' + Number(data.precio).toLocaleString('es-AR') : ''],
        ['M2 vendibles', data.m2_vendibles ? data.m2_vendibles + ' m²' : ''],
        ['Incidencia', data.incidencia ? 'USD ' + Number(data.incidencia).toLocaleString('es-AR') + '/m²' : '']
      ];
      var html = '<span class="success-badge">✅ Cargado en Google Sheets</span><table class="table-result">';
      fields.forEach(function(f) {
        html += '<tr><td>' + f[0] + '</td><td>' + (f[1] || '<span style="color:#ccc">—</span>') + '</td></tr>';
      });
      return html + '</table>';
    }

    async function send() {
      var input = document.getElementById('input');
      var text = input.value.trim();
      if (!text && !pendingImage) return;

      var imgSrc = pendingImage ? document.getElementById('preview-img').src : null;
      if (imgSrc) {
        addMsg('<img class="preview" src="' + imgSrc + '"/>' + (text || ''), 'user', true);
      } else {
        addMsg(text, 'user');
      }

      input.value = '';
      document.getElementById('btn-send').disabled = true;

      var typing = addMsg('', 'bot');
      typing.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

      var body = { message: text };
      if (pendingImage) {
        body.image = pendingImage;
        body.imageType = pendingImageType;
      }
      clearImage();

      try {
        var res = await fetch('/api/process', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        var result = await res.json();
        typing.remove();
        if (result.success) {
          addMsg(renderTable(result.data), 'bot', true);
        } else {
          addMsg('Error: ' + result.error, 'error');
        }
      } catch(e) {
        typing.remove();
        addMsg('Error de conexión: ' + e.message, 'error');
      }

      document.getElementById('btn-send').disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
